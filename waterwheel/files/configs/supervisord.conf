[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:playwright-mcp]
command=/usr/local/bin/playwright-mcp
autostart=false
autorestart=true
startsecs=5
priority=1
stopasgroup=true
killasgroup=true
stdout_logfile=/agent/outputs/playwright.log
stderr_logfile=/agent/outputs/playwright.err
user=root

[program:email-mcp]
command=/usr/local/bin/email-mcp
autostart=false
autorestart=true
startsecs=10
priority=2
stdout_logfile=/agent/outputs/email-mcp.log
stderr_logfile=/agent/outputs/email-mcp.err